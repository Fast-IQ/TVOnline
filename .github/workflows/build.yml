name: Android Build & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  APP_NAME: "RussianTVPlayer"

jobs:
  # Job для проверки качества кода
  lint:
    runs-on: ubuntu-latest
    name: Lint Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x TVApp/gradlew

      - name: Run Lint
        run: cd TVApp && ./gradlew lintDebug --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: TVApp/app/build/reports/lint-results-debug.html
          retention-days: 7

  # Job для сборки и тестирования
  build:
    runs-on: ubuntu-latest
    name: Build & Test
    needs: lint
    
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x TVApp/gradlew

      - name: Decode Keystore (for release builds)
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$ENCODED_STRING" ]; then
            echo "$ENCODED_STRING" | base64 -d > TVApp/app/release-key.jks
            echo "Keystore decoded successfully"
          else
            echo "Warning: No keystore found in secrets"
          fi

      - name: Get Version Info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="debug-${{ github.run_number }}-${{ github.sha::7 }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build Debug APK
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: cd TVApp && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: cd TVApp && ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Release Bundle (AAB)
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: cd TVApp && ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Run Tests
        run: cd TVApp && ./gradlew test --no-daemon
        continue-on-error: true

      - name: List Build Outputs (Debug)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: find TVApp/app/build/outputs/apk/debug -name "*.apk" -type f

      - name: List Build Outputs (Release)
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: find TVApp/app/build/outputs/apk/release -name "*.apk" -type f

      - name: Upload Debug APK
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            TVApp/app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload Release APK
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            TVApp/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release Bundle
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            TVApp/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: warn

  # Job для создания релиза на GitHub
  release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./artifacts/apk

      - name: Download Release Bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: ./artifacts/bundle

      - name: List Artifacts
        run: |
          echo "=== APK Files ==="
          ls -la ./artifacts/apk/
          echo "=== AAB Files ==="
          ls -la ./artifacts/bundle/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ needs.build.outputs.version }}"
          body: |
            ## 📺 Russian TV Player - Version ${{ needs.build.outputs.version }}
            
            ### 🎯 Что нового:
            - Просмотр российских телеканалов в высоком качестве
            - Поддержка управления с пульта ДУ
            - Электронная программа передач (EPG) с общей временной шкалой
            - Настройки часового пояса и языка интерфейса
            - Выбор качества потока (минимум, среднее, максимум, авто)
            - Запоминание последнего канала
            - Удобная навигация: ВВЕРХ/ВНИЗ - каналы, ВЛЕВО/ВПРАВО - время
            
            ### 📦 Файлы для установки:
            - `app-release.apk` - Для установки на Android TV приставки
            - `app-release.aab` - Для публикации в Google Play Store
            
            ### 🔧 Требования:
            - Android 7.0 (API 24) или выше
            - Устройство с поддержкой Android TV или пульт ДУ
            
            ### 📝 Установка:
            1. Скачайте файл `app-release.apk`
            2. Установите на ваше Android TV устройство
            3. Запустите приложение и наслаждайтесь просмотром!
            
            ---
            *Сборка выполнена автоматически через GitHub Actions*
          files: |
            ./artifacts/apk/*.apk
            ./artifacts/bundle/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
